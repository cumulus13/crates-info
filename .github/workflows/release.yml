# ─────────────────────────────────────────────────────────────────────────────
# Release — triggers when you push a version tag: git tag v0.2.0 && git push --tags
#
# Builds native binaries for:
#   Linux   x86-64  (musl — fully static, runs on any distro)
#   Linux   ARM64   (musl)
#   Windows x86-64  (.exe)
#   macOS   x86-64  (Intel)
#   macOS   ARM64   (Apple Silicon)
#
# Then creates a GitHub Release and uploads all binaries as assets.
# ─────────────────────────────────────────────────────────────────────────────
name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"   # v0.1.0, v1.2.3-beta.1, etc.

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: cratesinfo

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  # ── build one artifact per target ───────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86-64 (static musl) ──────────────────────────────────────
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            asset_suffix: linux-x86_64
            use_cross: true

          # ── Linux ARM64 (static musl) ───────────────────────────────────────
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            asset_suffix: linux-arm64
            use_cross: true

          # ── Windows x86-64 ──────────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            asset_suffix: windows-x86_64
            use_cross: false

          # ── macOS Intel ─────────────────────────────────────────────────────
          - target: x86_64-apple-darwin
            runner: macos-latest
            asset_suffix: macos-x86_64
            use_cross: false

          # ── macOS Apple Silicon ─────────────────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-latest
            asset_suffix: macos-arm64
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      # cross compiles Linux musl + ARM targets without needing a local cross-compiler
      - name: Install cross (Linux targets)
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build with cross
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build with cargo
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }}

      # ── Package ─────────────────────────────────────────────────────────────
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          ARCHIVE="${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.tar.gz"
          tar -czf "../../../${ARCHIVE}" ${{ env.BINARY_NAME }}
          echo "ASSET=${ARCHIVE}" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          $ARCHIVE = "${{ env.BINARY_NAME }}-${{ github.ref_name }}-${{ matrix.asset_suffix }}.zip"
          Compress-Archive -Path "${{ env.BINARY_NAME }}.exe" -DestinationPath "../../../$ARCHIVE"
          echo "ASSET=$ARCHIVE" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.asset_suffix }}
          path: ${{ env.ASSET }}

  # ── create GitHub Release and attach all binaries ───────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Generate checksums (SHA-256)
        working-directory: artifacts
        run: |
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "cratesinfo ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## cratesinfo ${{ github.ref_name }}

            A fast CLI tool to get detailed info about Rust crates from crates.io.

            ### Installation

            **Windows** — download `cratesinfo-${{ github.ref_name }}-windows-x86_64.zip`, extract, add to PATH.

            **macOS (Intel)**
            ```sh
            curl -L https://github.com/cumulus13/crates-info/releases/download/${{ github.ref_name }}/cratesinfo-${{ github.ref_name }}-macos-x86_64.tar.gz | tar xz
            sudo mv cratesinfo /usr/local/bin/
            ```

            **macOS (Apple Silicon)**
            ```sh
            curl -L https://github.com/cumulus13/crates-info/releases/download/${{ github.ref_name }}/cratesinfo-${{ github.ref_name }}-macos-arm64.tar.gz | tar xz
            sudo mv cratesinfo /usr/local/bin/
            ```

            **Linux x86-64 (static)**
            ```sh
            curl -L https://github.com/cumulus13/crates-info/releases/download/${{ github.ref_name }}/cratesinfo-${{ github.ref_name }}-linux-x86_64.tar.gz | tar xz
            sudo mv cratesinfo /usr/local/bin/
            ```

            **Via cargo (all platforms)**
            ```sh
            cargo install crates-info
            ```

            ### Checksums
            See `SHA256SUMS.txt` attached below.

          files: |
            artifacts/*
